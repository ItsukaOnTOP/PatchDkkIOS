name: Build Dylib

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Theos
        uses: kabiroberai/theos-action@v1
        with:
          sdk-version: "16.5"
          theos-src: "https://github.com/theos/theos/archive/master.tar.gz"

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: IshinRedirect.dylib
          path: .theos/obj/debug/IshinRedirect.dylib
          if-no-files-found: error
