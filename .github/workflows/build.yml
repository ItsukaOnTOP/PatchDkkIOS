name: Build Dylib

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          
          # Récupérer l'URL avec auth
          SDK_URL=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/theos/sdks/releases/latest \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
assets = data.get('assets', [])
for a in assets:
    if 'iPhoneOS' in a['name']:
        print(a['browser_download_url'])
        break
")
          echo "URL: $SDK_URL"
          curl -L -H "Authorization: Bearer $GITHUB_TOKEN" -o sdk.tar.xz "$SDK_URL"
          ls -lh sdk.tar.xz
          tar -xf sdk.tar.xz -C $THEOS/sdks

      - name: Build dylib
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: IshinRedirect.dylib
          path: .theos/obj/debug/IshinRedirect.dylib
          if-no-files-found: error
