name: Build Dylib

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          
          gh release download --repo theos/sdks \
            --pattern "iPhoneOS16.5.sdk.tar.xz" \
            --dir /tmp/sdks
          
          tar -xf /tmp/sdks/iPhoneOS16.5.sdk.tar.xz -C $THEOS/sdks
          ls $THEOS/sdks

      - name: Build dylib
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: IshinRedirect.dylib
          path: .theos/obj/debug/IshinRedirect.dylib
          if-no-files-found: error
