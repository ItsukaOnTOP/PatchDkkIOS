name: Build Dylib

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # Télécharger le SDK via l'API GitHub releases
          SDK_URL=$(curl -s https://api.github.com/repos/theos/sdks/releases/latest \
            | grep "browser_download_url" \
            | grep "iPhoneOS" \
            | head -1 \
            | cut -d '"' -f 4)
          
          echo "SDK URL: $SDK_URL"
          curl -L -o sdk.tar.xz "$SDK_URL"
          tar -xf sdk.tar.xz -C $THEOS/sdks

      - name: Build dylib
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: IshinRedirect.dylib
          path: .theos/obj/debug/IshinRedirect.dylib
          if-no-files-found: error
